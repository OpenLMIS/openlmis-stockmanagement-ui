<div class="modal" tabindex="-1" role="dialog" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <button type="button" class="close" aria-label="Close" ng-click="$hide()">
          <span aria-hidden="true">&times;</span>
        </button>
        <h4 class="modal-title">
          {{'stockSignatureModal.title' | message}}
        </h4>
      </div>

      <div class="modal-body">
        <form id="signatureForm" ng-submit="vm.submit()">
          <fieldset>
            <label for="signature">{{'stockSignatureModal.signature' | message}}</label>
            <input id="signature" ng-model="vm.signature" type="text">
            <span class="info">
              {{'stockSignatureModal.submittedBy' | message: {username:vm.username} }}
            </span>
          </fieldset>
        </form>
      </div>

      <div class="modal-footer">
        <button ng-click="$hide()">{{'stockSignatureModal.cancel' | message}}</button>
        <input form="signatureForm" type="submit" value="{{'stockSignatureModal.confirm' | message}}"/>
      </div>

    </div>
  </div>
</div>
